name = "DominoPuzzleProof"
version = "0.1.0"
defaultTargets = ["DominoPuzzleProof"]

[[require]]
name = "VersoBlueprint"
git = "https://github.com/leanprover/verso-blueprint.git"
rev = "v4.31.0"

[[require]]
name = "mathlib"
scope = "leanprover-community"
git = "https://github.com/leanprover-community/mathlib4"
rev = "v4.31.0"

[[lean_lib]]
name = "DominoPuzzleProof"

[[lean_exe]]
name = "blueprint-gen"
root = "BlueprintMain"
supportInterpreter = true
