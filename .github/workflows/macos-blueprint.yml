name: macOS Blueprint Timing

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      timing_threshold_seconds:
        description: "Fail if BlueprintMain runtime exceeds this many seconds after the build."
        required: true
        default: "60"
      ssh_debug:
        description: "Open an SSH session on the macOS runner before timing."
        required: true
        type: boolean
        default: false

concurrency:
  group: macos-blueprint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-blueprint:
    name: macOS instrumented build and Blueprint timing
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      BLUEPRINT_TIMING_THRESHOLD_SECONDS: ${{ github.event.inputs.timing_threshold_seconds || '60' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner context
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          uname -a
          sysctl -n machdep.cpu.brand_string || true

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: false
          use-mathlib-cache: false

      - name: Lean context
        shell: bash
        run: |
          set -euo pipefail
          lean --version
          lake --version

      - name: Time Mathlib cache retrieval
        id: mathlib-cache
        shell: bash
        run: |
          set -euo pipefail

          start="$(date +%s)"
          /usr/bin/time -p lake exe cache get
          end="$(date +%s)"
          elapsed="$((end - start))"

          echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"
          echo "Mathlib cache retrieval elapsed seconds: $elapsed"

      - name: Lake environment context
        shell: bash
        run: |
          set -euo pipefail
          lake env lean --version
          lake env env | sort | grep -E '^(LAKE|LEAN|PATH)=' || true

      - name: Time standard lake build
        id: lake-build
        shell: bash
        run: |
          set -euo pipefail

          start="$(date +%s)"
          /usr/bin/time -p lake build
          end="$(date +%s)"
          elapsed="$((end - start))"

          echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"
          echo "Standard lake build elapsed seconds: $elapsed"

      - name: Build blueprint executable
        id: blueprint-exe-build
        shell: bash
        run: |
          set -euo pipefail

          start="$(date +%s)"
          /usr/bin/time -p lake build blueprint-gen
          end="$(date +%s)"
          elapsed="$((end - start))"

          echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"
          echo "Blueprint executable build elapsed seconds: $elapsed"

      - name: Optional SSH debug session
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_debug }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Time BlueprintMain with lean --run
        id: blueprint-lean-run
        shell: bash
        run: |
          set -euo pipefail

          if ! [[ "$BLUEPRINT_TIMING_THRESHOLD_SECONDS" =~ ^[0-9]+$ ]]; then
            echo "Invalid timing threshold: $BLUEPRINT_TIMING_THRESHOLD_SECONDS" >&2
            exit 2
          fi

          start="$(date +%s)"
          /usr/bin/time -p lake env lean --run BlueprintMain.lean
          end="$(date +%s)"
          elapsed="$((end - start))"

          echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"
          echo "BlueprintMain elapsed seconds: $elapsed"

          if (( elapsed > BLUEPRINT_TIMING_THRESHOLD_SECONDS )); then
            echo "::error::BlueprintMain took ${elapsed}s, above ${BLUEPRINT_TIMING_THRESHOLD_SECONDS}s."
            exit 1
          fi

      - name: Time compiled blueprint executable
        id: blueprint-exe-run
        if: ${{ always() && steps.blueprint-exe-build.conclusion == 'success' }}
        shell: bash
        run: |
          set -euo pipefail

          start="$(date +%s)"
          /usr/bin/time -p .lake/build/bin/blueprint-gen
          end="$(date +%s)"
          elapsed="$((end - start))"

          echo "elapsed_seconds=$elapsed" >> "$GITHUB_OUTPUT"
          echo "Compiled blueprint executable elapsed seconds: $elapsed"

      - name: Timing summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "### macOS Blueprint timing"
            echo ""
            echo "- Threshold: ${BLUEPRINT_TIMING_THRESHOLD_SECONDS}s"
            echo "- Mathlib cache retrieval: ${{ steps.mathlib-cache.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- Standard lake build: ${{ steps.lake-build.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- Blueprint executable build: ${{ steps.blueprint-exe-build.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- BlueprintMain via lean --run: ${{ steps.blueprint-lean-run.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- Compiled blueprint executable: ${{ steps.blueprint-exe-run.outputs.elapsed_seconds || 'not recorded' }}s"
          } >> "$GITHUB_STEP_SUMMARY"
