name: macOS Blueprint Timing

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      timing_threshold_seconds:
        description: "Fail if BlueprintMain runtime exceeds this many seconds after the build."
        required: true
        default: "60"
      ssh_debug:
        description: "Open an SSH session on the macOS runner before timing."
        required: true
        type: boolean
        default: false
      build_executable:
        description: "Also build and time the compiled blueprint executable."
        required: true
        type: boolean
        default: false

concurrency:
  group: macos-blueprint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-blueprint:
    name: macOS instrumented build and Blueprint timing
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      BLUEPRINT_TIMING_THRESHOLD_SECONDS: ${{ github.event.inputs.timing_threshold_seconds || '60' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner context
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          uname -a
          sysctl -n machdep.cpu.brand_string || true

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: false
          use-mathlib-cache: false

      - name: Restore Lake build cache
        id: lake-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .lake/build
            .lake/packages/Cli
            .lake/packages/LeanSearchClient
            .lake/packages/MD4Lean
            .lake/packages/Qq
            .lake/packages/VersoBlueprint
            .lake/packages/aesop
            .lake/packages/batteries
            .lake/packages/illuminate
            .lake/packages/importGraph
            .lake/packages/plausible
            .lake/packages/proofwidgets
            .lake/packages/subverso
            .lake/packages/verso
            .lake/packages/verso-slides
          key: lake-nonmathlib-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}-${{ hashFiles('*.lean', 'DominoPuzzleProof/**/*.lean') }}
          restore-keys: |
            lake-nonmathlib-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}-

      - name: Lean context
        shell: bash
        run: |
          set -euo pipefail
          lean --version
          lake --version

      - name: Time Mathlib cache retrieval
        id: mathlib-cache
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci-timed.sh "Mathlib cache retrieval" lake exe cache get

      - name: Lake environment context
        shell: bash
        run: |
          set -euo pipefail
          lake env lean --version
          lake env env | sort | grep -E '^(LAKE|LEAN|PATH)=' || true

      - name: Optional SSH debug session
        id: tmate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_debug }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: true

      - name: Publish SSH debug info
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_debug }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "ssh_command=${{ steps.tmate.outputs.ssh-command }}"
            echo "ssh_address=${{ steps.tmate.outputs.ssh-address }}"
            echo "web_url=${{ steps.tmate.outputs.web-url }}"
          } > tmate-info.txt

      - name: Upload SSH debug info
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_debug }}
        uses: actions/upload-artifact@v4
        with:
          name: tmate-info
          path: tmate-info.txt

      - name: Hold SSH debug session
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_debug }}
        shell: bash
        run: sleep 600

      - name: Time VersoBlueprint dependency build
        id: verso-build
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci-timed.sh "VersoBlueprint dependency build" lake build VersoBlueprint

      - name: Time TeX prelude build
        id: tex-prelude-build
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci-timed.sh "DominoPuzzleProof.TeXPrelude build" lake build DominoPuzzleProof.TeXPrelude

      - name: Time chapter build
        id: chapter-build
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci-timed.sh "DominoPuzzleProof.Chapters.DominoPuzzleProof build" lake build DominoPuzzleProof.Chapters.DominoPuzzleProof

      - name: Time manual build
        id: manual-build
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci-timed.sh "DominoPuzzleProof manual build" lake build DominoPuzzleProof

      - name: Time final standard lake build check
        id: lake-build
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci-timed.sh "Final standard lake build check" lake build

      - name: Save Lake build cache
        if: ${{ always() && steps.lake-cache.outputs.cache-hit != 'true' && steps.lake-build.conclusion == 'success' }}
        uses: actions/cache/save@v4
        with:
          path: |
            .lake/build
            .lake/packages/Cli
            .lake/packages/LeanSearchClient
            .lake/packages/MD4Lean
            .lake/packages/Qq
            .lake/packages/VersoBlueprint
            .lake/packages/aesop
            .lake/packages/batteries
            .lake/packages/illuminate
            .lake/packages/importGraph
            .lake/packages/plausible
            .lake/packages/proofwidgets
            .lake/packages/subverso
            .lake/packages/verso
            .lake/packages/verso-slides
          key: ${{ steps.lake-cache.outputs.cache-primary-key }}

      - name: Time BlueprintMain with lean --run
        id: blueprint-lean-run
        shell: bash
        run: |
          set -euo pipefail
          CI_TIMED_SAMPLE=1 \
          CI_TIMED_THRESHOLD_SECONDS="$BLUEPRINT_TIMING_THRESHOLD_SECONDS" \
            bash scripts/ci-timed.sh "BlueprintMain via lean --run" lake env lean --run BlueprintMain.lean

      - name: Build blueprint executable
        id: blueprint-exe-build
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_executable && steps.blueprint-lean-run.conclusion == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci-timed.sh "Blueprint executable build" lake build blueprint-gen

      - name: Time compiled blueprint executable
        id: blueprint-exe-run
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.build_executable && steps.blueprint-exe-build.conclusion == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci-timed.sh "Compiled blueprint executable runtime" .lake/build/bin/blueprint-gen

      - name: Timing summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "### macOS Blueprint timing"
            echo ""
            echo "- Threshold: ${BLUEPRINT_TIMING_THRESHOLD_SECONDS}s"
            echo "- Lake cache hit: ${{ steps.lake-cache.outputs.cache-hit || 'false' }}"
            echo "- Mathlib cache retrieval: ${{ steps.mathlib-cache.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- VersoBlueprint dependency build: ${{ steps.verso-build.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- TeX prelude build: ${{ steps.tex-prelude-build.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- Chapter build: ${{ steps.chapter-build.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- Manual build: ${{ steps.manual-build.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- Final standard lake build check: ${{ steps.lake-build.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- Blueprint executable build: ${{ steps.blueprint-exe-build.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- BlueprintMain via lean --run: ${{ steps.blueprint-lean-run.outputs.elapsed_seconds || 'not recorded' }}s"
            echo "- Compiled blueprint executable: ${{ steps.blueprint-exe-run.outputs.elapsed_seconds || 'not recorded' }}s"
          } >> "$GITHUB_STEP_SUMMARY"
